# T5 + LoRA rewriter (Idea 2) — train with:
#   uv run python rewriter/train.py --config configs/rewriter.yaml
#
# Split manifest is shared with drift-coefficient optimization (Idea 3): `test` IDs are held out
# of rewriter training and should be the only rows used when exporting drift feature rows for coef search.
#
# Tuned for **small pair counts** (~20–30 train rows after split): more epochs, smaller batches,
# fixed warmup steps, and no max_steps cap so training runs full num_train_epochs.

pairs_jsonl: outputs/cotrain/prompt_pairs.jsonl
split_manifest_path: outputs/cotrain/splits/rewriter_split_manifest.json
split_seed: 42
train_frac: 0.7
val_frac: 0.25
force_rebuild_split: true

base_model: t5-base
output_dir: outputs/rewriter/t5_lora_r8

# LoRA rank ablation: set to 4, 8, or 16 across separate runs / W&B runs.
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: ["q", "v"]

max_input_length: 512
max_target_length: 512

# Mixed-data training (~2k+ rows): larger batch + step cap for Colab.
per_device_train_batch_size: 8
per_device_eval_batch_size: 2
learning_rate: 0.0003
num_train_epochs: 3
max_steps: 1500
weight_decay: 0.01
# Use warmup_steps (not warmup_ratio) for predictable warmup on tiny datasets.
warmup_steps: 50
lr_scheduler_type: cosine
logging_steps: 20
eval_strategy: steps
eval_steps: 100
save_steps: 100
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: loss
bf16: true
seed: 42

# Decoder length at inference (rewrite_prompt / generate). >=256 avoids truncating long prompts;
# 512 aligns with max_target_length for full evolved templates.
generation_max_new_tokens: 512

# Rewriter slop metric (optional Groq + detector)
detector_checkpoint: pangram/editlens_roberta-large
groq_model: llama-3.3-70b-versatile
essay_temperature: 0.9
rewriter_slop_eval_n: 20  # uses all available val examples

wandb_project: promptlab-v2
wandb_entity: null
wandb_run_name: null

# Multi-source data mixing (organic + synthetic expansions)
mix_sources: true
data_mix_weights:
  organic: 1.0
  alpaca: 0.4
  cross_topic: 0.7
  augmented: 0.3

# Extra loss term: semantic similarity between predicted vs target prompts (MiniLM cosine)
semantic_loss_weight: 0.1
