# Prompt rewriter (QLoRA on Llama-3.2-3B) — supervised stage
base_model: "meta-llama/Llama-3.2-3B-Instruct"
# Requires HF access to Llama weights
output_dir: "outputs/rewriter_lora"
max_seq_length: 1024
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 4
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

pairs_jsonl: "outputs/rewriter/train_pairs.jsonl"
eval_split: 0.15
