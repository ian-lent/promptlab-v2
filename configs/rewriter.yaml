# T5 + LoRA rewriter (Idea 2) — train with:
#   uv run python rewriter/train.py --config configs/rewriter.yaml
#
# Split manifest is shared with drift-coefficient optimization (Idea 3): `test` IDs are held out
# of rewriter training and should be the only rows used when exporting drift feature rows for coef search.
#
# Tuned for **small pair counts** (~20–30 train rows after split): more epochs, smaller batches,
# fixed warmup steps, and no max_steps cap so training runs full num_train_epochs.

pairs_jsonl: outputs/cotrain/prompt_pairs.jsonl
split_manifest_path: outputs/cotrain/splits/rewriter_split_manifest.json
split_seed: 42
train_frac: 0.7
val_frac: 0.20
force_rebuild_split: true

base_model: t5-base
output_dir: outputs/rewriter/t5_lora_r8

# LoRA rank ablation: set to 4, 8, or 16 across separate runs / W&B runs.
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: ["q", "v"]

max_input_length: 512
max_target_length: 512

# Rewriter mode: "prompt" (input_prompt -> output_prompt) or "essay" (baseline_essay -> best_essay)
rewriter_mode: essay

# Essay rewriting mode (new)
essay_pairs_jsonl: outputs/rewriter/essay_pairs_contrastive.jsonl
max_input_tokens: 512
max_target_tokens: 512
essay_source_filter: ["organic"]

# Early stopping on rewriter_slop_mean (lower is better)
early_stopping_patience: 10

# Curriculum learning (essay mode): easiest-first by (baseline_slop - best_slop)
curriculum: true
curriculum_warmup_steps: 100

# Training schedule for tiny contrastive essay dataset
per_device_train_batch_size: 4
per_device_eval_batch_size: 2
learning_rate: 0.0003
num_train_epochs: 50
max_steps: 1500
weight_decay: 0.01
# Use warmup_steps (not warmup_ratio) for predictable warmup on tiny datasets.
warmup_steps: 50
lr_scheduler_type: cosine
logging_steps: 20
eval_strategy: steps
eval_steps: 50
save_steps: 50
save_total_limit: 2
load_best_model_at_end: false
metric_for_best_model: loss
bf16: true
seed: 42

# Decoder length at inference (rewrite_prompt / generate). >=256 avoids truncating long prompts;
# 512 aligns with max_target_length for full evolved templates.
generation_max_new_tokens: 512

# Rewriter slop metric (optional Groq + detector)
detector_checkpoint: pangram/editlens_roberta-large
groq_model: llama-3.3-70b-versatile
essay_temperature: 0.9
rewriter_slop_eval_n: 20  # uses all available val examples

# Deterministic generation for stable eval slop metric
eval_num_beams: 4
eval_do_sample: false

# Time-to-result tracking
ttr_thresholds: [0.7, 0.6, 0.5, 0.4]

wandb_project: promptlab-v2
wandb_entity: null
wandb_run_name: null

# Multi-source data mixing (organic + synthetic expansions)
mix_sources: true
data_mix_weights:
  organic: 1.0
  alpaca: 0.4
  cross_topic: 0.7
  augmented: 0.3

# Extra loss term: semantic similarity between predicted vs target prompts (MiniLM cosine)
semantic_loss_weight: 0.1

# EXPERIMENTAL LOG — append only, never delete
run_notes:
  - "2026-04-13: organic-only 20ep, 4 val, best slop 0.391 @ step ~150"
  - "2026-04-14: mixed 500 steps, 4 val, best slop 0.413 @ step 300"
  - "2026-04-14: mixed 1500 steps, 14 val, best slop 0.580 @ step 100"
  - "2026-04-15: organic 1500 steps, 14 val, best slop 0.759 @ step 1300"
  - "2026-04-15: essay mode, 18 contrastive pairs, exp_A — weight_decay=0.01, curriculum, beam eval"
