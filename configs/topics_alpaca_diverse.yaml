mapping_rules:
- Discuss X -> the causes and consequences of X
- Compare X and Y -> X and Y compared
- Explain the implications of X -> the implications of X
- Describe the effects of X -> the effects of X on Y
- Explain why X -> why X
- Analyze X -> the significance of X
